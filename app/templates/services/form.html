{% extends "base.html" %}

{% if service %}
    {% set page_title = "Редактирование услуги" %}
{% else %}
    {% set page_title = "Добавление услуги" %}
{% endif %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1">{{ page_title }}</h1>
                <p class="text-muted mb-0">Заполнение карточки услуги</p>
            </div>
            <a href="{{ url_for('services.list_services') }}" class="btn btn-outline-secondary">
                Назад
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="category_id" class="form-label">Категория</label>
                        <select class="form-select" id="category_id" name="category_id" required>
                            <option value="">Выберите категорию</option>
                            {% for category in categories %}
                                <option
                                    value="{{ category.id }}"
                                    {% if service and service.category_id == category.id %}selected{% endif %}
                                >
                                    {{ category.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label">Название услуги</label>
                        <input
                            type="text"
                            class="form-control"
                            id="name"
                            name="name"
                            value="{{ service.name if service else '' }}"
                            required
                        >
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="duration_min" class="form-label">Длительность (мин.)</label>
                            <input
                                type="number"
                                class="form-control"
                                id="duration_min"
                                name="duration_min"
                                value="{{ service.duration_min if service else '' }}"
                                required
                            >
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="base_price" class="form-label">Цена</label>
                            <input
                                type="number"
                                step="0.01"
                                class="form-control"
                                id="base_price"
                                name="base_price"
                                value="{{ service.base_price if service else '' }}"
                                required
                            >
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Описание</label>
                        <textarea
                            class="form-control"
                            id="description"
                            name="description"
                            rows="4"
                        >{{ service.description if service else '' }}</textarea>
                    </div>

                    <div class="form-check mb-4">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="is_active"
                            name="is_active"
                            {% if service %}
                                {% if service.is_active %}checked{% endif %}
                            {% else %}
                                checked
                            {% endif %}
                        >
                        <label class="form-check-label" for="is_active">
                            Активная услуга
                        </label>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('services.list_services') }}" class="btn btn-outline-secondary">
                            Отмена
                        </a>
                        <button type="submit" class="btn btn-dark">
                            {% if service %}Сохранить изменения{% else %}Добавить услугу{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
