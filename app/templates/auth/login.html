{% extends "base.html" %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-lg-5">
                <div class="text-center mb-4">
                    <h2 class="h3 mb-2">Вход в систему</h2>
                    <p class="text-muted mb-0">
                        АРМ администратора салона красоты "Эстетика"
                    </p>
                </div>

                <form method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Логин</label>
                        <input
                            type="text"
                            class="form-control"
                            id="username"
                            name="username"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Пароль</label>
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-dark w-100">
                        Войти
                    </button>
                </form>

                <div class="mt-4 p-3 bg-light rounded-3 small text-muted">
                    <div class="fw-semibold mb-2">Тестовые учётные записи:</div>
                    <div><strong>admin</strong> / admin123</div>
                    <div><strong>director</strong> / director123</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
